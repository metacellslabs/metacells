services:
  mongo:
    image: mongo:8
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "3400:3400"
    depends_on:
      - mongo
    environment:
      METACELLS_ROLE: web
      ROOT_URL: http://localhost:3400
      BIND_IP: 0.0.0.0
      MONGO_URL: mongodb://mongo:27017/metacells
      METACELLS_CONTAINER_HOST_ALIAS: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      bash -lc '
        npm install &&
        npm run build &&
        npm start
      '

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    network_mode: "service:app"
    depends_on:
      - app
    environment:
      METACELLS_ROLE: worker
      ROOT_URL: http://localhost:3410
      BIND_IP: 0.0.0.0
      MONGO_URL: mongodb://mongo:27017/metacells
      METACELLS_CONTAINER_HOST_ALIAS: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      bash -lc '
        npm install &&
        npm run start:worker
      '

volumes:
  node_modules:
  mongo_data:
